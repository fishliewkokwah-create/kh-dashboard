<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KH Reactor — Reef Alkalinity Control</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --deep:#081A22; --panel:#0D2530; --line:#16394A;
    --aqua:#3FD0C9; --aqua-dim:#1E7A76; --coral:#FF6B5E;
    --sand:#E8E3D5; --slate:#7A96A3; --amber:#F5B95F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--deep);color:var(--sand);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line)}
  header h1{font-family:'Chakra Petch';font-size:1.05rem;letter-spacing:.14em;text-transform:uppercase;color:var(--aqua)}
  header h1 span{color:var(--slate);font-weight:400}
  .conn{font-family:'IBM Plex Mono';font-size:.72rem;color:var(--slate)}
  .conn b{color:var(--aqua)}
  .grid{display:grid;grid-template-columns:290px 1fr;gap:14px;padding:14px 22px;max-width:1200px;margin:0 auto}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}
  .panel h2{font-family:'Chakra Petch';font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:14px}

  /* ---- burette signature ---- */
  .burette-wrap{display:flex;gap:18px;align-items:stretch}
  .burette{position:relative;width:56px;height:300px;border:1px solid var(--line);border-radius:28px;overflow:hidden;background:#06141B;flex-shrink:0}
  .burette .fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--aqua),var(--aqua-dim));transition:height 1s ease}
  .burette .band{position:absolute;left:0;right:0;background:rgba(63,208,201,.14);border-top:1px dashed var(--aqua-dim);border-bottom:1px dashed var(--aqua-dim)}
  .burette .tick{position:absolute;right:4px;font-family:'IBM Plex Mono';font-size:.58rem;color:var(--slate)}
  .kh-read{display:flex;flex-direction:column;justify-content:center}
  .kh-val{font-family:'Chakra Petch';font-size:3.6rem;font-weight:700;line-height:1;color:var(--sand)}
  .kh-val small{font-size:1.1rem;color:var(--slate);font-weight:400}
  .kh-state{font-family:'IBM Plex Mono';font-size:.72rem;margin-top:8px}
  .ok{color:var(--aqua)} .low{color:var(--amber)} .fault{color:var(--coral)}
  .meta{margin-top:16px;font-size:.78rem;color:var(--slate);line-height:1.7}
  .meta b{color:var(--sand);font-family:'IBM Plex Mono')}

  /* ---- chart ---- */
  .chart-panel{display:flex;flex-direction:column}
  .chart-box{flex:1;min-height:280px;position:relative}

  /* ---- controls ---- */
  .controls{grid-column:1 / -1;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .ctl label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .ctl input{width:100%;background:#06141B;border:1px solid var(--line);border-radius:6px;color:var(--sand);
             font-family:'IBM Plex Mono';font-size:.95rem;padding:9px 10px}
  .ctl input:focus{outline:2px solid var(--aqua-dim)}
  button{font-family:'Chakra Petch';letter-spacing:.08em;text-transform:uppercase;font-size:.74rem;
         background:var(--aqua-dim);color:var(--sand);border:0;border-radius:6px;padding:11px 14px;cursor:pointer;width:100%;margin-top:8px}
  button:hover{background:var(--aqua);color:var(--deep)}
  button.warn{background:transparent;border:1px solid var(--coral);color:var(--coral)}
  button.warn:hover{background:var(--coral);color:var(--deep)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel);
         border:1px solid var(--aqua-dim);border-radius:8px;padding:10px 18px;font-size:.8rem;display:none}
</style>
</head>
<body>
<header>
  <h1>KH Reactor <span>/ device KH-01</span></h1>
  <div class="conn">last log <b id="lastSeen">—</b></div>
</header>

<div class="grid">
  <!-- current reading -->
  <div class="panel">
    <h2>Current Alkalinity</h2>
    <div class="burette-wrap">
      <div class="burette" id="burette">
        <div class="band" id="band"></div>
        <div class="fill" id="fill" style="height:0%"></div>
      </div>
      <div class="kh-read">
        <div class="kh-val"><span id="khNow">—</span><small> dKH</small></div>
        <div class="kh-state" id="khState">waiting for data</div>
        <div class="meta">
          target <b id="mTarget">—</b> dKH<br>
          dosed 24 h <b id="mDosed">—</b> mL<br>
          last dose <b id="mDose">—</b> mL<br>
          status <b id="mStatus">—</b>
        </div>
      </div>
    </div>
  </div>

  <!-- trend -->
  <div class="panel chart-panel">
    <h2>KH Trend &amp; Dosing</h2>
    <div class="chart-box"><canvas id="chart"></canvas></div>
  </div>

  <!-- controls -->
  <div class="controls">
    <div class="panel ctl">
      <label for="inTarget">KH target (dKH)</label>
      <input id="inTarget" type="number" step="0.1" min="6" max="12" value="8.5">
      <button onclick="sendCmd({kh_target:+inTarget.value})">Set target</button>
    </div>
    <div class="panel ctl">
      <label for="inInterval">Test interval (min)</label>
      <input id="inInterval" type="number" step="30" min="60" max="1440" value="240">
      <button onclick="sendCmd({interval_min:+inInterval.value})">Set interval</button>
    </div>
    <div class="panel ctl">
      <label for="inDose">Manual dose (mL)</label>
      <input id="inDose" type="number" step="1" min="1" max="40" value="10">
      <button class="warn" onclick="sendCmd({manual_dose_ml:+inDose.value})">Dose now</button>
    </div>
    <div class="panel ctl">
      <label>Run titration</label>
      <div style="font-size:.75rem;color:var(--slate);line-height:1.5">Forces an immediate KH test on next poll (&le;30 s).</div>
      <button onclick="sendCmd({test_now:true})">Test now</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const GSCRIPT_URL = "https://script.google.com/macros/s/AKfycbzI9vNDV4Zpt68U7YUl_FvZ9M6Tbjq84N0IRB-q62iz7rPdAIqCprusrydc9wbHNZtM/exec";
const DEVICE = "KH-01";
const KH_MIN = 6, KH_MAX = 12;          // burette scale
/* ========================================== */

let chart;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 2500);
}

async function sendCmd(obj){
  try{
    // GET with query params, mode:'no-cors' -- the command reaches and runs
    // on the server regardless; we deliberately don't try to read a response
    // back (Apps Script's redirect makes that unreliable cross-origin), so
    // no-cors avoids a spurious CORS error for a request that already worked.
    const params = new URLSearchParams(Object.assign({action:'setcmd', device:DEVICE}, obj));
    await fetch(GSCRIPT_URL + '?' + params.toString(), {mode:'no-cors'});
    toast('Command queued — device picks it up within 30 s');
  }catch(e){ toast('Send failed — check URL / connection'); }
}

// JSONP loader -- bypasses CORS entirely via a <script> tag instead of fetch,
// since Apps Script's redirect doesn't reliably send CORS headers a fetch()
// can read, but a script tag has no such restriction.
let jsonpCounter = 0;
function jsonpRequest(url){
  return new Promise((resolve, reject) => {
    const cbName = 'khCb_' + (jsonpCounter++);
    const script = document.createElement('script');
    const cleanup = () => { delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('JSONP load failed')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
    setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, 10000);
  });
}

function pct(kh){ return Math.max(0, Math.min(100, (kh-KH_MIN)/(KH_MAX-KH_MIN)*100)); }

function render(rows){
  if(!rows.length) return;
  const last = rows[rows.length-1];
  const kh = Number(last.kh), tgt = Number(last.target);

  document.getElementById('khNow').textContent = kh > 0 ? kh.toFixed(2) : '—';
  document.getElementById('mTarget').textContent = tgt.toFixed(1);
  document.getElementById('mDosed').textContent = Number(last.dosed24h).toFixed(0);
  document.getElementById('mDose').textContent = Number(last.dose).toFixed(1);
  document.getElementById('mStatus').textContent = last.status;
  document.getElementById('lastSeen').textContent = new Date(last.t).toLocaleString();
  document.getElementById('inTarget').value = tgt;

  // burette fill + deadband
  document.getElementById('fill').style.height = pct(kh) + '%';
  const band = document.getElementById('band'), dead = 0.3;
  band.style.bottom = pct(tgt-dead) + '%';
  band.style.height = (pct(tgt+dead)-pct(tgt-dead)) + '%';

  const st = document.getElementById('khState');
  if(last.status && last.status.startsWith('fault')){ st.textContent='TITRATION FAULT — check reagent/probe'; st.className='kh-state fault'; }
  else if(kh < tgt-dead){ st.textContent='BELOW TARGET — dosing active'; st.className='kh-state low'; }
  else if(kh > tgt+dead){ st.textContent='ABOVE TARGET — dosing paused'; st.className='kh-state low'; }
  else { st.textContent='IN BAND'; st.className='kh-state ok'; }

  // chart
  const labels = rows.map(r=>new Date(r.t).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}));
  const khs   = rows.map(r=>Number(r.kh));
  const tgts  = rows.map(r=>Number(r.target));
  const doses = rows.map(r=>Number(r.dose));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    data:{ labels,
      datasets:[
        {type:'line', label:'KH (dKH)', data:khs, borderColor:'#3FD0C9', backgroundColor:'rgba(63,208,201,.12)',
         tension:.3, fill:true, pointRadius:2, yAxisID:'y'},
        {type:'line', label:'Target', data:tgts, borderColor:'#7A96A3', borderDash:[6,4], pointRadius:0, yAxisID:'y'},
        {type:'bar', label:'Dose (mL)', data:doses, backgroundColor:'rgba(245,185,95,.55)', yAxisID:'y2'}
      ]},
    options:{ maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#7A96A3',font:{family:'IBM Plex Mono',size:10}}}},
      scales:{
        x:{ticks:{color:'#57707C',maxTicksLimit:8,font:{size:9}},grid:{color:'#12303E'}},
        y:{min:6,max:12,title:{display:true,text:'dKH',color:'#7A96A3'},ticks:{color:'#7A96A3'},grid:{color:'#12303E'}},
        y2:{position:'right',min:0,title:{display:true,text:'mL',color:'#7A96A3'},ticks:{color:'#7A96A3'},grid:{display:false}}
      }}
  });
}

async function load(){
  if(GSCRIPT_URL.startsWith('PASTE')){ render(demoData()); return; }
  try{
    const data = await jsonpRequest(GSCRIPT_URL + '?action=history&n=200');
    render(data);
  }catch(e){ toast('Fetch failed — showing nothing new'); }
}

/* demo data so the dashboard is previewable before wiring up */
function demoData(){
  const rows=[]; let kh=7.6;
  for(let i=48;i>=0;i--){
    const drift=-0.06+Math.random()*0.04;
    const dose = kh<8.2 ? Math.min((8.5-kh)*45,40) : 0;
    kh += drift + dose*0.012;
    rows.push({t:Date.now()-i*4*3600e3, kh:kh.toFixed(2), target:8.5,
               dose:dose.toFixed(1), dosed24h:(dose*3).toFixed(0), status:'ok'});
  }
  return rows;
}

load();
setInterval(load, 60000);   // refresh every minute
</script>
</body>
</html>
